<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Graph Intelligence — Projects</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d0d; color: #d4d4d4; min-height: 100vh; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid #2a2a2a; background: #141414; }
        .top-bar h1 { font-size: 15px; font-weight: 600; color: #e8e8e8; letter-spacing: 0.5px; }
        .top-bar .user-info { display: flex; align-items: center; gap: 12px; }
        .top-bar .username { font-size: 11px; color: #888; }
        .top-bar .logout { padding: 5px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px; color: #888; font-size: 10px; cursor: pointer; font-family: inherit; }
        .top-bar .logout:hover { color: #ddd; border-color: #555; }
        .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .header-row h2 { font-size: 16px; font-weight: 500; color: #ccc; }
        .btn { padding: 9px 18px; border: 1px solid #3a3a3a; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; background: #1a1a1a; color: #ddd; }
        .btn:hover { border-color: #555; background: #1f1f1f; }
        .btn-primary { border-color: #4a4a4a; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .project-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 6px; padding: 18px; cursor: pointer; transition: border-color 0.15s; }
        .project-card:hover { border-color: #555; }
        .project-card .name { font-size: 14px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
        .project-card .desc { font-size: 10px; color: #666; margin-bottom: 12px; min-height: 14px; }
        .project-card .meta { display: flex; gap: 14px; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        .project-card .meta .val { color: #aaa; font-weight: 600; }
        .project-card .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 10px; border-top: 1px solid #222; }
        .project-card .created-by { font-size: 9px; color: #555; }
        .project-card .del-btn { padding: 3px 8px; background: none; border: 1px solid #2a2020; border-radius: 3px; color: #a77; font-size: 9px; cursor: pointer; font-family: inherit; }
        .project-card .del-btn:hover { border-color: #a55; color: #c55; }
        .empty { text-align: center; padding: 60px 20px; color: #333; }
        .empty h3 { font-size: 14px; color: #3a3a3a; font-weight: 400; margin-bottom: 6px; }
        .empty p { font-size: 11px; color: #2a2a2a; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 28px; width: 400px; }
        .modal h3 { font-size: 14px; color: #e0e0e0; margin-bottom: 20px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 6px; font-weight: 600; }
        .field input, .field textarea { width: 100%; padding: 9px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; color: #bbb; font-size: 12px; font-family: inherit; }
        .field textarea { resize: vertical; min-height: 60px; }
        .field input:focus, .field textarea:focus { outline: none; border-color: #555; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
        .btn-cancel { background: none; border: 1px solid #2a2a2a; color: #888; }
        .theme-btn { padding: 5px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px; color: #888; font-size: 10px; cursor: pointer; font-family: inherit; }
        .theme-btn:hover { color: #ddd; border-color: #555; }
        body.light { background: #f0f0f0; color: #222; }
        body.light .top-bar { background: #fff; border-bottom-color: #ddd; }
        body.light .top-bar h1 { color: #222; }
        body.light .top-bar .username { color: #666; }
        body.light .top-bar .logout, body.light .theme-btn { background: #f5f5f5; border-color: #ddd; color: #888; }
        body.light .header-row h2 { color: #333; }
        body.light .btn { background: #f5f5f5; border-color: #ccc; color: #222; }
        body.light .project-card { background: #fff; border-color: #ddd; }
        body.light .project-card:hover { border-color: #999; }
        body.light .project-card .name { color: #222; }
        body.light .project-card .desc { color: #888; }
        body.light .project-card .meta { color: #888; }
        body.light .project-card .meta .val { color: #333; }
        body.light .project-card .card-footer { border-top-color: #eee; }
        body.light .project-card .created-by { color: #888; }
        body.light .empty h3 { color: #999; }
        body.light .empty p { color: #bbb; }
        body.light .modal { background: #fff; border-color: #ddd; }
        body.light .modal h3 { color: #222; }
        body.light .field label { color: #888; }
        body.light .field input, body.light .field textarea { background: #f5f5f5; border-color: #ddd; color: #333; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Forensic Graph Intelligence</h1>
        <div class="user-info">
            <span class="username" id="currentUser"></span>
            <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Light</button>
            <button class="logout" onclick="logout()">Sign Out</button>
        </div>
    </div>
    <div class="container">
        <div class="header-row">
            <h2>Projects</h2>
            <button class="btn btn-primary" onclick="openNewModal()">+ New Project</button>
        </div>
        <div id="projectsGrid" class="projects-grid"></div>
        <div id="emptyState" class="empty" style="display:none">
            <h3>No projects yet</h3>
            <p>Create your first project to start analysing documents.</p>
        </div>
    </div>

    <div class="modal-overlay" id="newModal">
        <div class="modal">
            <h3>New Project</h3>
            <form onsubmit="createProject(event)">
                <div class="field">
                    <label>Project Name</label>
                    <input type="text" id="projName" required placeholder="e.g. Operation Meridian">
                </div>
                <div class="field">
                    <label>Description (optional)</label>
                    <textarea id="projDesc" placeholder="Brief description of the investigation..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeNewModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="createBtn">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    const TOKEN = localStorage.getItem('fgi_token');
    if (!TOKEN) window.location.href = '/login';

    function toggleTheme() {
        const cur = localStorage.getItem('fgi_theme') || 'dark';
        const next = cur === 'dark' ? 'light' : 'dark';
        localStorage.setItem('fgi_theme', next);
        applyTheme(next);
    }
    function applyTheme(t) {
        document.body.classList.toggle('light', t === 'light');
        document.getElementById('themeBtn').textContent = t === 'light' ? 'Dark' : 'Light';
    }
    applyTheme(localStorage.getItem('fgi_theme') || 'dark');

    document.getElementById('currentUser').textContent = localStorage.getItem('fgi_username') || '';

    function authHeaders() { return { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' }; }

    function logout() {
        localStorage.removeItem('fgi_token');
        localStorage.removeItem('fgi_username');
        window.location.href = '/login';
    }

    function openNewModal() { document.getElementById('newModal').classList.add('open'); }
    function closeNewModal() { document.getElementById('newModal').classList.remove('open'); }

    async function apiFetch(url, opts = {}) {
        opts.headers = { ...authHeaders(), ...(opts.headers || {}) };
        const res = await fetch(url, opts);
        if (res.status === 401) { logout(); return null; }
        return res;
    }

    async function loadProjects() {
        const res = await apiFetch('/api/projects');
        if (!res) return;
        const data = await res.json();
        const grid = document.getElementById('projectsGrid');
        const empty = document.getElementById('emptyState');
        if (!data.projects || data.projects.length === 0) {
            grid.innerHTML = '';
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';
        grid.innerHTML = data.projects.map(p => `
            <div class="project-card" onclick="openProject(${p.id})">
                <div class="name">${esc(p.name)}</div>
                <div class="desc">${esc(p.description || '')}</div>
                <div class="meta">
                    <span>Entities: <span class="val">${p.entity_count || 0}</span></span>
                    <span>Relationships: <span class="val">${p.relationship_count || 0}</span></span>
                </div>
                <div class="card-footer">
                    <span class="created-by">by ${esc(p.created_by_name || '?')} &middot; ${formatDate(p.created_at)}</span>
                    <button class="del-btn" onclick="event.stopPropagation();deleteProject(${p.id},'${esc(p.name)}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function openProject(id) { window.location.href = '/?project_id=' + id; }

    async function createProject(e) {
        e.preventDefault();
        const btn = document.getElementById('createBtn');
        btn.disabled = true; btn.textContent = 'Creating...';
        try {
            const res = await apiFetch('/api/projects', {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('projName').value,
                    description: document.getElementById('projDesc').value,
                }),
            });
            if (res && res.ok) {
                closeNewModal();
                loadProjects();
                document.getElementById('projName').value = '';
                document.getElementById('projDesc').value = '';
            }
        } finally { btn.disabled = false; btn.textContent = 'Create'; }
    }

    async function deleteProject(id, name) {
        if (!confirm('Delete project "' + name + '"? This cannot be undone.')) return;
        await apiFetch('/api/projects/' + id, { method: 'DELETE' });
        loadProjects();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    loadProjects();
    </script>
</body>
</html>
